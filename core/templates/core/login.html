{% load static %}
<!DOCTYPE html>
<html lang="id" id="html-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - U-Rank</title>
    <link rel="icon" type="image/png" href="/media/assets/loggo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "cyan-500": "#06b6d4",
              "cyan-600": "#0891b2",
              "blue-500": "#3b82f6",
              "blue-600": "#2563eb",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #ecfeff 0%, #ffffff 50%, #f0f9ff 100%);
        min-height: 100vh;
      }
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.1);
      }
      .input-modern {
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid rgba(6, 182, 212, 0.2);
        border-radius: 12px;
        padding: 12px 16px;
        transition: all 0.3s ease;
      }
      .input-modern:focus {
        outline: none;
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        background: white;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <!-- Alert Messages -->
    {% if messages %}
    <div
      class="fixed top-10 left-1/2 transform -translate-x-1/2 z-50 space-y-2 w-[90%] max-w-md"
    >
      {% for message in messages %}
      <div
        class="glass px-4 py-3 rounded-xl shadow-lg flex items-center space-x-2 animate-fade-in {% if message.tags == 'success' %} border border-green-200 {% elif message.tags == 'warning' %} border border-yellow-200 {% elif message.tags == 'info' %} border border-cyan-200 {% elif message.tags == 'error' or message.tags == 'danger' %} border border-red-200 {% else %} border border-slate-200 {% endif %}"
      >
        <i
          class="fas {% if message.tags == 'success' %}fa-check-circle text-green-600 {% elif message.tags == 'warning' %}fa-exclamation-circle text-yellow-600 {% elif message.tags == 'info' %}fa-info-circle text-cyan-600 {% elif message.tags == 'error' or message.tags == 'danger' %}fa-times-circle text-red-600 {% else %}fa-bell text-slate-600{% endif %}"
        ></i>
        <span class="text-sm text-slate-700">{{ message }}</span>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div
      class="glass rounded-2xl shadow-2xl overflow-hidden w-full max-w-md animate-fade-in"
    >
      <div
        class="bg-gradient-to-r from-cyan-600 to-blue-600 p-8 text-center relative overflow-hidden"
      >
        <div
          class="absolute -top-10 -left-10 w-20 h-20 bg-white rounded-full opacity-10 animate-float"
        ></div>
        <div
          class="absolute -bottom-5 -right-5 w-24 h-24 bg-white rounded-full opacity-10 animate-float"
          style="animation-delay: 0.5s"
        ></div>
        <div class="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4 relative z-10">
          <i class="fas fa-sign-in-alt text-white text-3xl"></i>
        </div>
        <h2 class="text-3xl font-black text-white relative z-10 mb-2" style="font-family: 'Space Grotesk', sans-serif;" data-i18n="login_title">
          Masuk
        </h2>
        <p class="text-cyan-100 mt-1 relative z-10" data-i18n="login_subtitle">Masuk ke akun Anda</p>
      </div>

      <div class="p-8">
        <!-- FORM LOGIN -->
        <form method="post" class="space-y-5">
          {% csrf_token %}
          <div class="input-modern">
            <label for="username" class="block text-xs text-slate-500 mb-2 font-semibold">
              Username
            </label>
            <div class="flex items-center">
              <i class="fas fa-user text-cyan-600 mr-3"></i>
              <input
                type="text"
                name="username"
                id="username"
                required
                class="w-full outline-none bg-transparent text-slate-700 placeholder-slate-400"
                placeholder="Username Anda"
                data-i18n-placeholder="login_username_placeholder"
              />
            </div>
          </div>

          <div class="input-modern">
            <label for="password" class="block text-xs text-slate-500 mb-2 font-semibold">
              Password
            </label>
            <div class="flex items-center">
              <i class="fas fa-lock text-cyan-600 mr-3"></i>
              <input
                type="password"
                name="password"
                id="password"
                required
                class="w-full outline-none bg-transparent text-slate-700 placeholder-slate-400"
                placeholder="••••••••"
              />
              <button
                type="button"
                class="text-slate-400 hover:text-cyan-600 transition"
                id="togglePassword"
              >
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input
                type="checkbox"
                id="remember"
                name="remember"
                class="h-4 w-4 text-cyan-600 rounded border-slate-300 focus:ring-cyan-500"
              />
              <label for="remember" class="ml-2 text-sm text-slate-600" data-i18n="login_remember">
                Ingat Saya
              </label>
            </div>
            <a
              href="#"
              class="text-sm text-cyan-600 hover:text-cyan-700 font-medium hover:underline"
              data-i18n="login_forgot"
              >Lupa password?</a
            >
          </div>

          <button
            type="submit"
            class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-700 hover:to-blue-700 text-white py-3 px-4 rounded-xl font-semibold transition-all duration-300 transform hover:scale-[1.02] shadow-lg hover:shadow-xl"
          >
            <i class="fas fa-sign-in-alt mr-2"></i><span data-i18n="login_btn">Masuk</span>
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-slate-600">
            <span data-i18n="login_no_account">Belum punya akun?</span>
            <a
              href="{% url 'register' %}"
              class="text-cyan-600 hover:text-cyan-700 font-semibold hover:underline"
              data-i18n="login_signup"
              >Daftar</a
            >
          </p>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        togglePassword.addEventListener("click", function () {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);
          this.innerHTML =
            type === "password"
              ? '<i class="fas fa-eye-slash"></i>'
              : '<i class="fas fa-eye"></i>';
        });
      });
    </script>
    <script src="/static/core/js/translations.js"></script>
  </body>
</html>
