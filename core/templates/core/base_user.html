{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}U-Rank{% endblock %}</title>
  <link rel="icon" type="image/png" href="/media/assets/loggo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "cyan-50": "#ecfeff",
            "cyan-100": "#cffafe",
            "cyan-200": "#a5f3fc",
            "cyan-300": "#67e8f9",
            "cyan-400": "#22d3ee",
            "cyan-500": "#06b6d4",
            "cyan-600": "#0891b2",
            "cyan-700": "#0e7490",
            "cyan-800": "#155e75",
            "cyan-900": "#164e63",
            "blue-50": "#eff6ff",
            "blue-100": "#dbeafe",
            "blue-200": "#bfdbfe",
            "blue-300": "#93c5fd",
            "blue-400": "#60a5fa",
            "blue-500": "#3b82f6",
            "blue-600": "#2563eb",
            "blue-700": "#1d4ed8",
            "blue-800": "#1e40af",
            "blue-900": "#1e3a8a",
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Space Grotesk", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #ecfeff 0%, #ffffff 50%, #f0f9ff 100%);
      color: #1e293b;
      min-height: 100vh;
    }

    /* Glassmorphism Effect */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.1);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #06b6d4, #3b82f6);
      border-radius: 4px;
    }

    /* Navbar */
    .navbar {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(6, 182, 212, 0.1);
    }

    /* Button Pill */
    .btn-pill {
      border-radius: 50px;
      padding: 10px 24px;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      color: white;
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 15px 40px rgba(6, 182, 212, 0.4);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: white;
      color: #06b6d4;
      border: 2px solid #06b6d4;
    }

    .btn-secondary:hover {
      background: #ecfeff;
    }

    /* Card Glassmorphism */
    .card-glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(6, 182, 212, 0.2);
      box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.1);
    }

    .card-glass:hover {
      box-shadow: 0 12px 40px 0 rgba(6, 182, 212, 0.15);
      transform: translateY(-2px);
      transition: all 0.3s ease;
    }

    /* Input Style */
    .input-modern {
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid rgba(6, 182, 212, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      transition: all 0.3s ease;
    }

    .input-modern:focus {
      outline: none;
      border-color: #06b6d4;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      background: white;
    }

    /* Table Style */
    .table-modern {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      overflow: hidden;
    }

    /* Fade In Animation */
    .fade-in-up {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease-out;
    }

    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  {% block extra_css %}{% endblock %}
  <style>
    /* Language Switcher */
    .lang-switcher-wrapper { position: relative; }
    .lang-switcher-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 50px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(6,182,212,0.25);
      font-size: 13px;
      font-weight: 600;
      color: #0891b2;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }
    .lang-switcher-btn:hover { background: rgba(6,182,212,0.08); border-color: #06b6d4; }
    .lang-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 140px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(6,182,212,0.15);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(6,182,212,0.15);
      overflow: hidden;
      z-index: 999;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #334155;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
    }
    .lang-btn:hover { background: rgba(6,182,212,0.07); color: #0891b2; }
    .lang-btn-active { background: rgba(6,182,212,0.12) !important; color: #0891b2 !important; font-weight: 700; }
    .lang-btn-active::after { content: '✓'; margin-left: auto; }
  </style>
</head>
<body>
  {% include 'core/navbar.html' %}
  
  <main class="min-h-screen pt-20 pb-12">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Intersection Observer for Fade In Up Animation
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, observerOptions);

    document.querySelectorAll('.fade-in-up').forEach(el => {
      observer.observe(el);
    });
  </script>
  <script src="{% static 'core/js/translations.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
