<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Edit User - U-Rank</title>
    {% load static %}
    <link rel="icon" type="image/png" href="/media/assets/loggo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    {% csrf_token %}
  </head>
  <body class="bg-gray-100">
    <div class="flex min-h-screen">
      <!-- SIDEBAR -->
      <div
        class="w-64 h-screen fixed left-0 top-0 bg-blue-900 text-white flex flex-col"
      >
        <div class="flex items-center justify-between p-4 bg-blue-800">
          <div class="flex items-center space-x-3">
            <i class="w-[20px] fas fa-cogs text-2xl"></i>
            <span class="text-xl font-bold">Admin Panel</span>
          </div>
        </div>

        <nav class="flex-1 p-3 space-y-1">
          <a
            href="{% url 'dashboard' %}"
            class="flex items-center cursor-pointer px-4 py-2 rounded hover:bg-blue-700 transition duration-150 ease-in-out"
          >
            <i class="w-[20px] fas fa-tachometer-alt mr-2"></i> Dashboard
          </a>
          <div class="w-full h-[1px] place-self-center bg-blue-50/50"></div>
          <a
            href="{% url 'dashboard_section' 'users' %}"
            class="flex items-center cursor-pointer px-4 py-2 rounded bg-blue-700"
          >
            <i class="w-[20px] fas fa-users mr-2"></i> Pengguna
          </a>
        </nav>

        <div class="p-4 border-t border-blue-800 mt-auto">
          <div class="flex items-center space-x-3 mb-3">
            <img
              src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=0D8ABC&color=fff"
              alt="Avatar"
              class="h-10 w-10 rounded-full ring-2 ring-white"
            />
            <p class="text-sm font-semibold text-white truncate">
              {{ request.user.username }}
            </p>
          </div>
          <a
            href="{% url 'logout' %}"
            class="w-full inline-flex items-center justify-center px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded transition duration-150 ease-in-out"
          >
            <i class="fas fa-sign-out-alt mr-2"></i>
            Logout
          </a>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="ml-64 flex-1 p-6">
        <div class="bg-white shadow rounded-xl p-6" style="max-width: 600px; margin: 0 auto;">
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Edit User</h2>
      <p class="text-sm text-gray-500">Update user information below.</p>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
          Username
        </label>
        <input
          type="text"
          name="username"
          id="username"
          value="{{ user_obj.username }}"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          type="email"
          name="email"
          id="email"
          value="{{ user_obj.email }}"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>

      <div>
        <label for="whatsapp" class="block text-sm font-medium text-gray-700 mb-1">
          WhatsApp Number
        </label>
        <input
          type="text"
          name="whatsapp"
          id="whatsapp"
          value="{{ user_obj.whatsapp_number|default:'' }}"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>

      <div>
        <label for="role" class="block text-sm font-medium text-gray-700 mb-1">
          Role
        </label>
        <select
          name="role"
          id="role"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
          <option value="user" {% if user_obj.role == 'user' %}selected{% endif %}>User</option>
          <option value="admin" {% if user_obj.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>

          <div class="flex justify-end space-x-3 pt-4">
            <a
              href="{% url 'dashboard_section' 'users' %}"
              class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg transition duration-150 ease-in-out"
            >
              Cancel
            </a>
            <button
              type="submit"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition duration-150 ease-in-out"
            >
              <i class="fas fa-save mr-2"></i>
              Update User
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
