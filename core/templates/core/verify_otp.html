{% load static %}
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi OTP - U-Rank</title>
    <link rel="icon" type="image/png" href="/media/assets/loggo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "cyan-50": "#ecfeff",
              "cyan-100": "#cffafe",
              "cyan-200": "#a5f3fc",
              "cyan-300": "#67e8f9",
              "cyan-400": "#22d3ee",
              "cyan-500": "#06b6d4",
              "cyan-600": "#0891b2",
              "cyan-700": "#0e7490",
              "cyan-800": "#155e75",
              "cyan-900": "#164e63",
              "blue-50": "#eff6ff",
              "blue-100": "#dbeafe",
              "blue-200": "#bfdbfe",
              "blue-300": "#93c5fd",
              "blue-400": "#60a5fa",
              "blue-500": "#3b82f6",
              "blue-600": "#2563eb",
              "blue-700": "#1d4ed8",
              "blue-800": "#1e40af",
              "blue-900": "#1e3a8a",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #ecfeff 0%, #ffffff 50%, #f0f9ff 100%);
        color: #1e293b;
        min-height: 100vh;
      }

      /* Glassmorphism Effect */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(6, 182, 212, 0.1);
      }

      /* Button Pill */
      .btn-pill {
        border-radius: 50px;
        padding: 10px 24px;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-primary {
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        color: white;
        box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
      }

      .btn-primary:hover {
        box-shadow: 0 15px 40px rgba(6, 182, 212, 0.4);
        transform: translateY(-2px);
      }

      /* Input Style */
      .input-modern {
        background: rgba(255, 255, 255, 0.8);
        border: 2px solid rgba(6, 182, 212, 0.2);
        border-radius: 12px;
        padding: 12px 16px;
        transition: all 0.3s ease;
      }

      .input-modern:focus {
        outline: none;
        border-color: #06b6d4;
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        background: white;
      }

      /* Fade In Animation */
      .fade-in-up {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.6s ease-out;
      }

      .fade-in-up.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <!-- Alert Container -->
    <div id="alert-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div class="flex items-center justify-center min-h-screen px-4 py-12">
      <div class="glass rounded-2xl shadow-2xl overflow-hidden w-full max-w-md fade-in-up">
        <!-- Header with Gradient -->
        <div class="bg-gradient-to-r from-cyan-600 to-blue-600 p-8 text-center relative overflow-hidden">
          <!-- Background Pattern -->
          <div class="absolute inset-0 opacity-10">
            <div class="absolute top-4 left-4 w-2 h-16 bg-white rounded-full"></div>
            <div class="absolute top-8 left-12 w-2 h-24 bg-white rounded-full"></div>
            <div class="absolute top-4 left-20 w-2 h-20 bg-white rounded-full"></div>
          </div>
          
          <!-- Icon -->
          <div class="relative z-10 mb-4">
            <div class="w-20 h-20 bg-white bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
              <i class="fas fa-shield-alt text-white text-3xl"></i>
            </div>
          </div>
          
          <h2 class="text-2xl font-black text-white relative z-10 mb-2" style="font-family: 'Space Grotesk', sans-serif;">
            Verifikasi OTP
          </h2>
          <p class="text-cyan-100 text-sm relative z-10">
            Masukkan kode OTP yang dikirim ke
            <span class="font-bold text-white">{{ user_obj.whatsapp_number }}</span>
          </p>
        </div>

        <!-- Form Content -->
        <div class="p-8">
          <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- OTP Input -->
            <div>
              <label for="otp" class="block text-sm font-semibold text-slate-700 mb-2">
                <i class="fas fa-key text-cyan-600 mr-2"></i>Kode OTP
              </label>
              <input
                type="text"
                name="otp"
                id="otp"
                required
                maxlength="6"
                pattern="[0-9]{6}"
                class="input-modern w-full text-center text-2xl font-bold tracking-widest"
                placeholder="000000"
                autocomplete="off"
                autofocus
              />
              <p class="text-xs text-slate-500 mt-2 text-center">
                Masukkan 6 digit kode OTP yang telah dikirim ke WhatsApp Anda
              </p>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="btn-pill btn-primary w-full py-3 text-base font-semibold"
            >
              <i class="fas fa-check-circle mr-2"></i>
              Verifikasi OTP
            </button>

            <!-- Resend OTP Link -->
            <div class="text-center pt-4 border-t border-slate-200">
              <p class="text-sm text-slate-600 mb-2">
                Tidak menerima kode OTP?
              </p>
              <a
                href="{% url 'register' %}"
                class="text-sm text-cyan-600 hover:text-cyan-700 font-medium transition-colors"
              >
                <i class="fas fa-redo mr-1"></i>
                Daftar Ulang
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Auto-focus on OTP input
      document.addEventListener('DOMContentLoaded', function() {
        const otpInput = document.getElementById('otp');
        if (otpInput) {
          otpInput.focus();
        }

        // Format OTP input (only numbers, max 6 digits)
        if (otpInput) {
          otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
          });

          // Auto-submit when 6 digits entered
          otpInput.addEventListener('input', function(e) {
            if (this.value.length === 6) {
              // Optional: auto-submit after a short delay
              // setTimeout(() => {
              //   this.form.submit();
              // }, 500);
            }
          });
        }

        // Fade in animation
        const elements = document.querySelectorAll('.fade-in-up');
        elements.forEach((el, index) => {
          setTimeout(() => {
            el.classList.add('visible');
          }, index * 100);
        });
      });

      // Show Django messages as alerts
      {% if messages %}
      document.addEventListener('DOMContentLoaded', function() {
        const alertContainer = document.getElementById('alert-container');
        {% for message in messages %}
        const alertDiv = document.createElement('div');
        alertDiv.className = `flex items-center p-4 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full glass`;
        
        let bgColor, icon;
        {% if message.tags == 'success' %}
        bgColor = 'bg-green-500';
        icon = 'fas fa-check-circle';
        {% elif message.tags == 'error' %}
        bgColor = 'bg-red-500';
        icon = 'fas fa-times-circle';
        {% elif message.tags == 'warning' %}
        bgColor = 'bg-yellow-500';
        icon = 'fas fa-exclamation-triangle';
        {% else %}
        bgColor = 'bg-cyan-500';
        icon = 'fas fa-info-circle';
        {% endif %}
        
        alertDiv.className += ` ${bgColor} text-white`;
        alertDiv.innerHTML = `
          <i class="${icon} mr-3 text-lg"></i>
          <span class="flex-1">{{ message|escapejs }}</span>
          <button onclick="this.parentElement.remove()" class="ml-3 hover:text-white hover:opacity-80">
            <i class="fas fa-times"></i>
          </button>
        `;
        
        alertContainer.appendChild(alertDiv);
        
        setTimeout(() => {
          alertDiv.classList.remove('translate-x-full');
        }, 100);
        
        setTimeout(() => {
          alertDiv.classList.add('translate-x-full');
          setTimeout(() => alertDiv.remove(), 300);
        }, 5000);
        {% endfor %}
      });
      {% endif %}
    </script>
  </body>
</html>
