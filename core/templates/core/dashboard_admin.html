<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <script
      src="https://kit.fontawesome.com/a076d05399.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-gray-100">
    <div class="flex min-h-screen">
      <!-- SIDEBAR -->
      <div class="w-64 bg-blue-900 text-white flex flex-col">
        <div class="flex items-center justify-between p-4 bg-blue-800">
          <div class="flex items-center space-x-3">
            <i class="fas fa-cogs text-2xl"></i>
            <span class="text-xl font-bold">Admin Panel</span>
          </div>
        </div>

        <nav class="flex-1 p-3 space-y-1">
          <a
            hx-get="{% url 'dashboard_section' 'stats' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
            data-section="stats"
            class="sidebar-link flex items-center cursor-pointer px-4 py-2 rounded hover:bg-blue-700 transition duration-150 ease-in-out"
          >
            <i class="fas fa-tachometer-alt mr-2"></i> Dashboard
          </a>

          <a
            hx-get="{% url 'dashboard_section' 'users' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
            data-section="users"
            class="sidebar-link flex items-center cursor-pointer px-4 py-2 rounded hover:bg-blue-700 transition duration-150 ease-in-out"
          >
            <i class="fas fa-users mr-2"></i> Users
          </a>

          <a
            hx-get="{% url 'dashboard_section' 'billing' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
            data-section="billing"
            class="sidebar-link flex items-center cursor-pointer px-4 py-2 rounded hover:bg-blue-700 transition duration-150 ease-in-out"
          >
            <i class="fas fa-file-invoice-dollar mr-2"></i> Pembayaran
          </a>
        </nav>

        <!-- Footer Sidebar -->
        <div class="p-4 border-t border-blue-800 mt-auto">
          <!-- Foto dan Username -->
          <div class="flex items-center space-x-3 mb-3">
            <img
              src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=0D8ABC&color=fff"
              alt="Avatar"
              class="h-10 w-10 rounded-full ring-2 ring-white"
            />
            <p class="text-sm font-semibold text-white truncate">
              {{ request.user.username }}
            </p>
          </div>

          <!-- Tombol Logout -->
          <button
            onclick="openLogoutModal()"
            class="w-full inline-flex items-center justify-center px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-red-400"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H5a3 3 0 01-3-3V7a3 3 0 013-3h5a3 3 0 013 3v1"
              />
            </svg>
            Logout
          </button>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="flex-1 p-6" id="main-content">
        {% include 'core/dashboard_stats.html' %}
      </div>
    </div>

    <!-- LOGOUT MODAL -->
    <div
      id="logoutModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center"
    >
      <div class="bg-white rounded shadow-xl p-6 w-80">
        <h3 class="text-lg font-semibold text-gray-800 mb-3">
          Konfirmasi Logout
        </h3>
        <p class="text-sm text-gray-600 mb-5">
          Apakah Anda yakin ingin logout dari sistem?
        </p>
        <div class="flex justify-end space-x-2">
          <button
            onclick="closeLogoutModal()"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300"
          >
            Batal
          </button>
          <a
            href="{% url 'logout' %}"
            class="inline-flex items-center justify-center px-5 py-2.5 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 transition duration-300 ease-in-out"
          >
            <svg
              class="w-5 h-5 mr-2 -ml-1"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H5a3 3 0 01-3-3V7a3 3 0 013-3h5a3 3 0 013 3v1"
              ></path>
            </svg>
            Logout
          </a>
        </div>
      </div>
    </div>

    <script>
      function openLogoutModal() {
        document.getElementById("logoutModal").classList.remove("hidden");
      }

      function closeLogoutModal() {
        document.getElementById("logoutModal").classList.add("hidden");
      }

      document.addEventListener("DOMContentLoaded", function () {
        const links = document.querySelectorAll(".sidebar-link");
        const currentSection = document
          .getElementById("main-content")
          .getAttribute("data-section");

        links.forEach((link) => {
          link.addEventListener("click", function () {
            links.forEach((l) => l.classList.remove("bg-blue-700"));
            this.classList.add("bg-blue-700");
          });

          // Tandai active secara otomatis jika cocok dengan data-section
          if (link.getAttribute("data-section") === currentSection) {
            link.classList.add("bg-blue-700");
          }
        });
      });
    </script>
  </body>
</html>
